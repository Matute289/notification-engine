# Render Blueprint — NotificationEngine
#
# Postgres and Redis are provisioned by Render (managed).
# RabbitMQ and MongoDB are external managed services — Render does not support
# pulling arbitrary Docker Hub images in Blueprint service definitions.
#
# Before applying this Blueprint, set up:
#   • RabbitMQ → CloudAMQP (https://cloudamqp.com) — free "Lemur" plan is enough to start.
#                Copy the AMQP URL (amqps://...) into RABBITMQ_URL.
#   • MongoDB  → MongoDB Atlas (https://mongodb.com/atlas) — free M0 cluster.
#                Copy the connection string (mongodb+srv://...) into MONGODB_URI.
#
# Usage:
#   1. Push this repo to GitHub / GitLab.
#   2. Render dashboard → New → Blueprint → select this repo.
#   3. Render detects render.yaml and shows a form for the sync: false vars.
#   4. Fill in the secrets (see list below), then click Apply.

databases:
  - name: notification-postgres
    databaseName: notif
    user: notif
    plan: free           # upgrade to "starter" or "standard" for production

services:
  # ─── Redis (Render Key Value) ─────────────────────────────────────
  - type: redis
    name: notification-redis
    plan: free           # upgrade for production
    ipAllowList: []      # private network only

  # ─── API (web service) ────────────────────────────────────────────
  - type: web
    name: notification-api
    runtime: docker
    dockerfilePath: ./deploy/docker/Dockerfile.api
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: HTTP_ADDR
        value: :8080
      - key: LOG_LEVEL
        value: info
      - key: POSTGRES_DSN
        fromDatabase:
          name: notification-postgres
          property: connectionString
      - key: REDIS_ADDR
        fromService:
          name: notification-redis
          type: redis
          property: host
      # ── External services (set manually) ──
      - key: RABBITMQ_URL
        sync: false   # CloudAMQP AMQP URL: amqps://user:pass@host/vhost
      - key: MONGODB_URI
        sync: false   # Atlas connection string: mongodb+srv://user:pass@cluster/
      - key: MONGODB_DATABASE
        value: notification_engine
      - key: TEMPLATE_CACHE_TTL
        value: 5m
      # ── Provider ──
      - key: PROVIDER_MODE
        value: mock   # change to "real" and add provider credentials for production
      # ── Behaviour knobs ──
      - key: MAX_RETRIES
        value: "5"
      - key: DEDUPE_TTL
        value: 24h
      - key: RATELIMIT_WINDOW
        value: 1h
      - key: RATELIMIT_PUSH_PER_HOUR
        value: "20"
      - key: RATELIMIT_SMS_PER_HOUR
        value: "5"
      - key: RATELIMIT_EMAIL_PER_HOUR
        value: "10"
      - key: APP_KEY_RATE_LIMIT
        value: "0"
      - key: APP_KEY_RATE_WINDOW
        value: 1s
      - key: HMAC_SKEW
        value: 5m
      - key: JANITOR_INTERVAL
        value: 30s
      - key: JANITOR_STUCK_THRESHOLD
        value: 5m
      - key: JANITOR_BATCH_SIZE
        value: "100"
      - key: RELAY_INTERVAL
        value: 500ms
      - key: RELAY_BATCH_SIZE
        value: "100"
      # ── Auth (at least one required) ──
      - key: CLERK_ISSUER
        sync: false   # e.g. https://<slug>.clerk.accounts.dev
      - key: CLERK_AUTHORIZED_PARTIES
        sync: false   # comma-separated allowed origins (can be left empty)
      - key: APP_CLIENTS
        sync: false   # HMAC clients: key1:secret1,key2:secret2 (optional if Clerk is set)

  # ─── Per-channel workers ───────────────────────────────────────────
  - type: worker
    name: worker-push-ios
    runtime: docker
    dockerfilePath: ./deploy/docker/Dockerfile.worker
    plan: starter
    envVars:
      - fromGroup: worker-shared
      - key: WORKER_CHANNEL
        value: push_ios

  - type: worker
    name: worker-push-android
    runtime: docker
    dockerfilePath: ./deploy/docker/Dockerfile.worker
    plan: starter
    envVars:
      - fromGroup: worker-shared
      - key: WORKER_CHANNEL
        value: push_android

  - type: worker
    name: worker-sms
    runtime: docker
    dockerfilePath: ./deploy/docker/Dockerfile.worker
    plan: starter
    envVars:
      - fromGroup: worker-shared
      - key: WORKER_CHANNEL
        value: sms

  - type: worker
    name: worker-email
    runtime: docker
    dockerfilePath: ./deploy/docker/Dockerfile.worker
    plan: starter
    envVars:
      - fromGroup: worker-shared
      - key: WORKER_CHANNEL
        value: email

  # ─── Janitor (stuck-notification rescue) ──────────────────────────
  - type: worker
    name: janitor
    runtime: docker
    dockerfilePath: ./deploy/docker/Dockerfile.janitor
    plan: starter
    envVars:
      - fromGroup: worker-shared

  # ─── Outbox relay ─────────────────────────────────────────────────
  - type: worker
    name: outbox-relay
    runtime: docker
    dockerfilePath: ./deploy/docker/Dockerfile.outbox-relay
    plan: starter
    envVars:
      - fromGroup: worker-shared

# ─── Env group "worker-shared" ──────────────────────────────────────
# Create this group in Render dashboard → Env Groups → New Group
# named exactly "worker-shared", with these variables:
#
#   POSTGRES_DSN        (copy from notification-postgres → Connection String)
#   REDIS_ADDR          (copy from notification-redis → Host, port 6379)
#   RABBITMQ_URL        amqps://user:pass@host/vhost  (from CloudAMQP)
#   MONGODB_URI         mongodb+srv://user:pass@cluster/ (from Atlas)
#   MONGODB_DATABASE    notification_engine
#   WORKER_CONCURRENCY  8
#   MAX_RETRIES         5
#   PROVIDER_MODE       mock
#   LOG_LEVEL           info
#   JANITOR_INTERVAL          30s
#   JANITOR_STUCK_THRESHOLD   5m
#   JANITOR_BATCH_SIZE        100
#   RELAY_INTERVAL            500ms
#   RELAY_BATCH_SIZE          100
