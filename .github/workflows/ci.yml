name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    # Also runs on PRs targeting render so render-specific changes
    # (render.yaml, DEPLOY_RENDER.md) go through CI before merging.
    branches: [main, development, render]

jobs:
  build-and-test:
    name: Build, vet & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...
