name: Release to Render

# Manual release gate: runs tests on the render branch and bumps a
# render-vX.Y.Z tag. The deploy itself is handled by Render's Auto-Deploy
# on the render branch — sync-render.yml already pushed render when main
# was updated, so the deploy is already running (or done) by the time this
# tag is created. This workflow exists solely to produce an immutable release
# marker and to gate the tag behind a passing test run.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to tag (e.g. 1.2.3 — tag will be render-v1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Tag render-v${{ github.event.inputs.version }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: render
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests on render HEAD
        run: go test -race -count=1 ./...

      - name: Create and push tag
        run: |
          TAG="render-v${{ github.event.inputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
