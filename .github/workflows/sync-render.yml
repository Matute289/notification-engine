name: Sync render branch from main

# Runs whenever main is updated. Rebases render onto main so that the
# render-specific commits (render.yaml, DEPLOY_RENDER.md) are always on top
# of the latest main, keeping a clean linear history with no merge commits.
#
# Uses --force-with-lease (safe force push): aborts if someone else pushed
# to render since the last fetch, preventing accidental overwrites.
#
# GITHUB_TOKEN cannot push to branches with "Require a pull request before
# merging" protection. If that rule is enabled on `render`, create a fine-grained
# PAT with Contents: Write, store it as secret SYNC_TOKEN, and replace
# `${{ secrets.GITHUB_TOKEN }}` below with `${{ secrets.SYNC_TOKEN }}`.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    name: Rebase render onto main
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebase render onto main
        run: |
          git checkout render
          git rebase origin/main
          git push origin render --force-with-lease
