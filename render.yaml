# Render Blueprint — NotificationEngine
#
# Postgres and Redis are provisioned by Render (managed).
# RabbitMQ → CloudAMQP (https://cloudamqp.com, free "Lemur" plan)
# MongoDB  → MongoDB Atlas (https://mongodb.com/atlas, free M0 cluster)
#
# Before applying:
#   1. Create a CloudAMQP instance → copy the AMQP URL (amqps://...)
#   2. Create a MongoDB Atlas cluster → copy the connection string (mongodb+srv://...)
#   3. Render dashboard → New → Blueprint → select this repo
#   4. Fill in the sync:false secrets → Apply

databases:
  - name: notification-postgres
    databaseName: notif
    user: notif
    plan: free           # upgrade to "starter" or "standard" for production

envVarGroups:
  - name: worker-shared
    envVars:
      # External services — set these after creating CloudAMQP + Atlas
      - key: RABBITMQ_URL
        sync: false       # amqps://user:pass@host/vhost  (from CloudAMQP)
      - key: MONGODB_URI
        sync: false       # mongodb+srv://user:pass@cluster/  (from Atlas)
      - key: MONGODB_DATABASE
        value: notification_engine
      # Worker behaviour
      - key: WORKER_CONCURRENCY
        value: "8"
      - key: MAX_RETRIES
        value: "5"
      - key: PROVIDER_MODE
        value: mock       # change to "real" for production
      - key: LOG_LEVEL
        value: info
      # Janitor
      - key: JANITOR_INTERVAL
        value: 30s
      - key: JANITOR_STUCK_THRESHOLD
        value: 5m
      - key: JANITOR_BATCH_SIZE
        value: "100"
      # Outbox relay
      - key: RELAY_INTERVAL
        value: 500ms
      - key: RELAY_BATCH_SIZE
        value: "100"

services:
  # ─── Redis (Render Key Value) ─────────────────────────────────────
  - type: redis
    name: notification-redis
    plan: free           # upgrade for production
    ipAllowList: []      # private network only

  # ─── API (web service) ────────────────────────────────────────────
  - type: web
    name: notification-api
    runtime: docker
    dockerfilePath: ./deploy/docker/Dockerfile.api
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: HTTP_ADDR
        value: :8080
      - key: LOG_LEVEL
        value: info
      - key: POSTGRES_DSN
        fromDatabase:
          name: notification-postgres
          property: connectionString
      - key: REDIS_ADDR
        fromService:
          name: notification-redis
          type: redis
          property: host
      - key: RABBITMQ_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: notification_engine
      - key: TEMPLATE_CACHE_TTL
        value: 5m
      - key: PROVIDER_MODE
        value: mock
      - key: MAX_RETRIES
        value: "5"
      - key: DEDUPE_TTL
        value: 24h
      - key: RATELIMIT_WINDOW
        value: 1h
      - key: RATELIMIT_PUSH_PER_HOUR
        value: "20"
      - key: RATELIMIT_SMS_PER_HOUR
        value: "5"
      - key: RATELIMIT_EMAIL_PER_HOUR
        value: "10"
      - key: APP_KEY_RATE_LIMIT
        value: "0"
      - key: APP_KEY_RATE_WINDOW
        value: 1s
      - key: HMAC_SKEW
        value: 5m
      - key: JANITOR_INTERVAL
        value: 30s
      - key: JANITOR_STUCK_THRESHOLD
        value: 5m
      - key: JANITOR_BATCH_SIZE
        value: "100"
      - key: RELAY_INTERVAL
        value: 500ms
      - key: RELAY_BATCH_SIZE
        value: "100"
      # ── Auth ──
      - key: CLERK_ISSUER
        sync: false       # e.g. https://<slug>.clerk.accounts.dev
      - key: CLERK_AUTHORIZED_PARTIES
        sync: false       # comma-separated allowed origins (can be left empty)
      - key: APP_CLIENTS
        sync: false       # key1:secret1,key2:secret2 (optional if Clerk is set)

  # ─── Per-channel workers ───────────────────────────────────────────
  - type: worker
    name: worker-push-ios
    runtime: docker
    dockerfilePath: ./deploy/docker/Dockerfile.worker
    plan: starter
    envVars:
      - fromGroup: worker-shared
      - key: POSTGRES_DSN
        fromDatabase:
          name: notification-postgres
          property: connectionString
      - key: REDIS_ADDR
        fromService:
          name: notification-redis
          type: redis
          property: host
      - key: WORKER_CHANNEL
        value: push_ios

  - type: worker
    name: worker-push-android
    runtime: docker
    dockerfilePath: ./deploy/docker/Dockerfile.worker
    plan: starter
    envVars:
      - fromGroup: worker-shared
      - key: POSTGRES_DSN
        fromDatabase:
          name: notification-postgres
          property: connectionString
      - key: REDIS_ADDR
        fromService:
          name: notification-redis
          type: redis
          property: host
      - key: WORKER_CHANNEL
        value: push_android

  - type: worker
    name: worker-sms
    runtime: docker
    dockerfilePath: ./deploy/docker/Dockerfile.worker
    plan: starter
    envVars:
      - fromGroup: worker-shared
      - key: POSTGRES_DSN
        fromDatabase:
          name: notification-postgres
          property: connectionString
      - key: REDIS_ADDR
        fromService:
          name: notification-redis
          type: redis
          property: host
      - key: WORKER_CHANNEL
        value: sms

  - type: worker
    name: worker-email
    runtime: docker
    dockerfilePath: ./deploy/docker/Dockerfile.worker
    plan: starter
    envVars:
      - fromGroup: worker-shared
      - key: POSTGRES_DSN
        fromDatabase:
          name: notification-postgres
          property: connectionString
      - key: REDIS_ADDR
        fromService:
          name: notification-redis
          type: redis
          property: host
      - key: WORKER_CHANNEL
        value: email

  # ─── Janitor ──────────────────────────────────────────────────────
  - type: worker
    name: janitor
    runtime: docker
    dockerfilePath: ./deploy/docker/Dockerfile.janitor
    plan: starter
    envVars:
      - fromGroup: worker-shared
      - key: POSTGRES_DSN
        fromDatabase:
          name: notification-postgres
          property: connectionString
      - key: REDIS_ADDR
        fromService:
          name: notification-redis
          type: redis
          property: host

  # ─── Outbox relay ─────────────────────────────────────────────────
  - type: worker
    name: outbox-relay
    runtime: docker
    dockerfilePath: ./deploy/docker/Dockerfile.outbox-relay
    plan: starter
    envVars:
      - fromGroup: worker-shared
      - key: POSTGRES_DSN
        fromDatabase:
          name: notification-postgres
          property: connectionString
      - key: REDIS_ADDR
        fromService:
          name: notification-redis
          type: redis
          property: host
